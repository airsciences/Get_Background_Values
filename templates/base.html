<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}EPA Background Value Estimator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div id="loading-overlay" class="loading-overlay" hidden>
    <div class="loading-box">
      <div class="spinner"></div>
      <p>Working&hellip; fetching and crunching EPA data.</p>
      <p class="hint">This can take a minute the first time a year is requested. Please don't refresh or close this tab.</p>
    </div>
  </div>

  <header>
    <h1>EPA Background Value Estimator</h1>
    <p class="subtitle">Facility-specific NAAQS background levels from EPA's live AQS data files.</p>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>

  <script>
    // Safety net: reset the overlay on every page show, including bfcache
    // restores (e.g. the browser Back button), which replay the DOM state
    // the page had right before navigating away instead of reloading fresh.
    window.addEventListener("pageshow", function () {
      document.getElementById("loading-overlay").hidden = true;
      document.querySelectorAll("main form button[type=submit]").forEach(function (btn) {
        btn.disabled = false;
      });
    });
  </script>
</body>
</html>
